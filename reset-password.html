<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CENTRAL — Nueva contraseña</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d14; --surface: #15151f; --card: #1a1a27;
  --border: rgba(255,255,255,0.08); --text: #e8e8f0;
  --text2: #9999bb; --text3: #5555aa;
  --accent: #7c5cfc; --accent2: #a78bfa;
  --green: #22c55e; --red: #ef4444; --yellow: #f5c842;
}
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px 16px;
}
.logo-row { text-align: center; margin-bottom: 28px; }
.logo-mark {
  width: 52px; height: 52px; border-radius: 14px;
  background: linear-gradient(135deg, #7c5cfc, #a78bfa);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 10px;
  box-shadow: 0 8px 32px rgba(124,92,252,0.35);
}
.logo-name { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.panel {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 32px 28px;
  width: 100%; max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.panel-title { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
.panel-sub { font-size: 12px; color: var(--text2); margin-bottom: 24px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 5px; display: block; letter-spacing: .4px; text-transform: uppercase; }
.pw-wrap { position: relative; }
.form-input {
  width: 100%; padding: 10px 40px 10px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 9px; color: var(--text); font-size: 13.5px;
  outline: none; transition: border-color .2s;
}
.form-input:focus { border-color: var(--accent); }
.form-input.error { border-color: var(--red); }
.pw-toggle {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--text3);
  padding: 4px; display: flex; align-items: center; transition: color .2s;
}
.pw-toggle:hover { color: var(--text2); }
.pw-strength { margin-top: 6px; }
.pw-bar { height: 3px; border-radius: 2px; background: var(--border); margin-bottom: 4px; overflow: hidden; }
.pw-bar-fill { height: 100%; width: 0; border-radius: 2px; transition: width .3s, background .3s; }
.pw-label { font-size: 10.5px; color: var(--text3); }
.btn-primary {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, #7c5cfc, #a78bfa);
  color: #fff; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: opacity .2s; box-shadow: 0 4px 16px rgba(124,92,252,0.35);
}
.btn-primary:hover { opacity: .9; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.msg-box { border-radius: 8px; padding: 9px 12px; font-size: 12.5px; margin-bottom: 14px; display: none; }
.msg-error { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: var(--red); }
.msg-ok    { background: rgba(34,197,94,.12);  border: 1px solid rgba(34,197,94,.3);  color: var(--green); }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.back-link { display: block; text-align: center; margin-top: 20px; font-size: 12px; color: var(--accent2); text-decoration: none; }
.back-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="logo-row">
  <div class="logo-mark">C</div>
  <div class="logo-name">CENTRAL</div>
</div>

<div class="panel" id="mainPanel">
  <div class="panel-title">Nueva contraseña</div>
  <div class="panel-sub">Elige una contraseña segura para tu cuenta.</div>

  <div id="errBox" class="msg-box msg-error"></div>
  <div id="okBox"  class="msg-box msg-ok"></div>

  <div id="formSection">
    <div class="form-group">
      <label class="form-label">Nueva contraseña</label>
      <div class="pw-wrap">
        <input class="form-input" id="pw1" type="password" placeholder="Mínimo 8 caracteres" oninput="checkStrength(this.value)">
        <button type="button" class="pw-toggle" onclick="togglePw('pw1',this)" tabindex="-1">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="pw-strength">
        <div class="pw-bar"><div class="pw-bar-fill" id="pwFill"></div></div>
        <div class="pw-label" id="pwLabel">Escribe una contraseña</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Confirmar contraseña</label>
      <div class="pw-wrap">
        <input class="form-input" id="pw2" type="password" placeholder="Repite la contraseña">
        <button type="button" class="pw-toggle" onclick="togglePw('pw2',this)" tabindex="-1">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="btnReset" onclick="doReset()">Guardar nueva contraseña</button>
  </div>

  <a class="back-link" href="/central-registro.html">← Volver al inicio de sesión</a>
</div>

<script>
const BACKEND = 'https://central-backend-production.up.railway.app';
const token   = new URLSearchParams(window.location.search).get('token');

if (!token) {
  document.getElementById('errBox').style.display = 'block';
  document.getElementById('errBox').textContent   = 'Enlace inválido. Solicita uno nuevo.';
  document.getElementById('formSection').style.display = 'none';
}

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  btn.innerHTML = showing
    ? '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/><circle cx="12" cy="12" r="3"/></svg>'
    : '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>';
}

function checkStrength(val) {
  const fill = document.getElementById('pwFill');
  const label = document.getElementById('pwLabel');
  let score = 0;
  if (val.length >= 8)  score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const pct   = Math.min(100, score * 22);
  const color = score <= 1 ? '#ef4444' : score <= 3 ? '#f5c842' : '#22c55e';
  const text  = score <= 1 ? 'Débil' : score <= 3 ? 'Media' : 'Fuerte';
  fill.style.width = pct + '%';
  fill.style.background = color;
  label.textContent = val ? text : 'Escribe una contraseña';
  label.style.color = val ? color : 'var(--text3)';
}

async function doReset() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  document.getElementById('errBox').style.display = 'none';

  if (pw1.length < 8) { showErr('La contraseña debe tener al menos 8 caracteres'); return; }
  if (pw1 !== pw2)    { showErr('Las contraseñas no coinciden'); return; }

  const btn = document.getElementById('btnReset');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Guardando…';

  try {
    const res  = await fetch(BACKEND + '/api/tenant/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pw1 }),
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.error || 'Error al restablecer'); return; }
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('okBox').style.display = 'block';
    document.getElementById('okBox').textContent = '¡Contraseña actualizada! Redirigiendo al inicio de sesión…';
    setTimeout(() => window.location.href = '/central-registro.html', 2000);
  } catch {
    showErr('No se pudo conectar con el servidor');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Guardar nueva contraseña';
  }
}

function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = msg;
  el.style.display = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
</script>
</body>
</html>
